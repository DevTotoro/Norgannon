services:
  postgres:
    image: postgres:18-alpine
    container_name: thevideoclub-postgres
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}

      KEYCLOAK_DB_NAME: ${KEYCLOAK_DB_NAME}
    ports:
      - '${DB_PORT}:5432'
    volumes:
      - pgdata:/var/lib/postgresql
      - ./infra/database/init-db.sh:/docker-entrypoint-initdb.d/init-db.sh

  keycloak:
    image: quay.io/keycloak/keycloak:26.6
    container_name: thevideoclub-keycloak
    entrypoint: /opt/keycloak/entrypoint.sh
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/${KEYCLOAK_DB_NAME}
      KC_DB_USERNAME: ${DB_USER}
      KC_DB_PASSWORD: ${DB_PASSWORD}

      KC_BOOTSTRAP_ADMIN_USERNAME: ${KEYCLOAK_ADMIN_USER}
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD}

      KC_HTTP_PORT: ${KEYCLOAK_HTTP_PORT}

      KEYCLOAK_REALM_NAME: ${KEYCLOAK_REALM_NAME}
    ports:
      - '${KEYCLOAK_HTTP_PORT}:${KEYCLOAK_HTTP_PORT}'
    volumes:
      - ./infra/keycloak/thevideoclub.realm.json.tpl:/opt/keycloak/data/import-template/thevideoclub.realm.json.tpl:ro
      - ./infra/keycloak/entrypoint.sh:/opt/keycloak/entrypoint.sh:ro
    depends_on:
      - postgres

volumes:
  pgdata:
